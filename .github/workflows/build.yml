name: Build and release QPM package

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true

      - name: Install Ninja
        run: sudo apt-get install ninja-build

      - name: Download QPM
        run: |
          wget https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.8/qpm-linux-x64.zip
          unzip qpm-linux-x64.zip
          chmod +x qpm

      - name: QPM Restore
        run: ./qpm restore

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          cmake --build build

      - name: Create QMOD
        run: pwsh buildQMOD.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestModOne.qmod
          path: ./*.qmod
